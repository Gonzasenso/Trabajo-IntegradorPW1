<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <script src="https://kit.fontawesome.com/c4d24c071d.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="../../estilos_index_home.css" rel="stylesheet">
    <link href="./estilos_Contacto.css" rel="stylesheet">
    <script src="../../navbar.js" defer></script>
    <script src="../../footer.js" defer></script>
    <script src="./contacto.js" defer></script>
</head>

<body id="top">
    <header class="encabezado-principal">
        <nav class="navegacion-barra">
            <div class="logo">
                <a href="../../index.html">
                    <img src="../../img/fly_lena_logo_chico.png" alt="Fly Lena">
                </a>
            </div>

            <ul id="nav-links"></ul>

            <div id="user-container"></div>
        </nav>
    </header>

    <main>
        <section class="section-formulario">
            <form class="form-form" id="form-contacto">
                <label for="nombre">Nombre & Apellido</label>
                <input type="text" id="nombre" name="nombre" placeholder="Coloca aqui tu nombre y apellido." required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Coloca aqui tu@email.com" required>

                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" pattern="[\+]?[\d\s\-\(\)]{8,}"
                    title="Ingresar telefono válido (+Codigo de país, codigo de area, número de télefono)"
                    placeholder="+54 9 11 555 4444" required>

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribí tu mensaje..." required></textarea>

                <div class="form-actions">
                    <button type="submit" id="btn-enviar">Enviar</button>
                    <a href="../../index.html" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </section>

        <div id="modal-exito" class="modal-oculto">
            <div class="modal-contenido">
                <i class="fa-solid fa-circle-check icono-exito"></i>
                <h2>¡Mensaje enviado con éxito!</h2>
                <p>Gracias por comunicarte con Fly Lena. Te redirigiremos al inicio.</p>
            </div>
        </div>
    </main>

    <footer id="contacto-footer" class="footer-custom">
    </footer>
</body>

</html>
