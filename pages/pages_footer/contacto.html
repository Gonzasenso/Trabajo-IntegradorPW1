<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link href="./styles.css" rel="stylesheet">
</head>

<body>
    <main>
        <section class="section-formulario">
            <form class="form-form" action="#" method="post">
                <label for="nombre">Nombre & Apellido</label>
                <input type="text" id="nombre" name="nombre" placeholder="Coloca aqui tu nombre y apellido." required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Coloca aqui tu@email.com" required>

                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" pattern="[\+]?[\d\s\-\(\)]{8,}"
                    title="Ingresar telefono válido (+Codigo de país, codigo de area, número de télefono)"
                    placeholder="+54 9 11 555 4444" required>

                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribí tu mensaje..." required></textarea>

                <div class="form-actions">
                    <button type="submit">Enviar</button>
                    <a href="../../index.html" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
