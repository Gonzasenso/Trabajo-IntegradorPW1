<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Checkout Pasajeros</title>

</head>

<body>
    <header>
        <nav>
            <a class="logo" href="../../index.html"><img src="../../img/fly_lena_logo_chico.png" alt="logoFlyLena"></a>
            <ul>
                <li><a href="../../index.html">Inicio</a></li>
                <li><a href="">Vuelos</a></li>
                <li><a href="">Ofertas</a></li>
                <li><a href="">Ayuda</a></li>
            </ul>
            <a class="iconoPerfil" href="../perfil/perfil_de_usuario.html"><i class="fa-solid fa-user"></i></a>
        </nav>
    </header>


    <main>
        <h2> Checkout</h2>

        <ol class="container-lista">
            <li class="activo">Pasajeros</li>
            <li>Asientos</li>
            <li>Pago</li>
            <li>Confirmacion</li>
        </ol>

        <section class="container-datos-pasajeros">

            <h3> 1. Datos del pasajero</h3>
            <h4>Pasajero 1</h4>

            <form class="container-campos">
                <div class="campo-nombre">
                    <label>Nombre</label>
                    <input type="text" placeholder="Nombre">
                </div>

                <div class="campo-apellido">
                    <label>Apellido</label>
                    <input type="text" placeholder="Apellido">
                </div>

                <div class="campo-tipo-documento">
                    <label>Tipo de documento</label>

                    <select>
                        <option>DNI</option>
                        <option>Pasaporte</option>
                    </select>
                </div>

                <div class="campo-numero-dni">
                    <label>Número de documento</label>
                    <input type="text" placeholder="1234568">
                </div>

                <div class="campo-fn">
                    <label>Fecha de nacimiento</label>
                    <input type="date">
                </div>

                <div class="campo">
                    <label>Nacionalidad</label>
                    <select>
                        <option>Argentina</option>
                        <option>Bolivia</option>
                        <option>Brasil</option>
                        <option>Chile</option>
                        <option>Paraguay</option>
                        <option>Uruguay</option>
                    </select>
                </div>

                <div class="campo-email">
                    <label>Email</label>
                    <input type="email" placeholder="juanperez@email.com">
                </div>

                <div class="campo-tel">
                    <label>Teléfono</label>
                    <input type="tel" placeholder="+54 11 1234 5678">
                </div>
            </form>

            <section class="botton-agregar-pasajero">
                <button type="button"><strong>+ Agregar otro pasajero</strong></button>
            </section>

        </section>

<div class="botones">
        <section class="botton-cancelar">
            <button type="button">Cancelar</button>
        </section>

        <section class="botton-continuar">
            <button type="button">Continuar a Asientos</button>
        </section>
</div>

    </main>

    <footer>

    </footer>
</body>

</html>
