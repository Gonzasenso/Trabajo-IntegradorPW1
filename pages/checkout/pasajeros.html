<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../../../../../estilos_index_home.css">
    <script src="pasajeros.js" defer></script>
    <script src="../../../../navbar.js" defer></script>
    <script src="../../../../../footer.js" defer></script>
    <title>Checkout Pasajeros</title>
</head>

<body>
    <header>
        <nav>
            <a class="logo" href="../../index.html"><img src="../../img/fly_lena_logo_chico.png" alt="logoFlyLena"></a>
            <ul id="nav-links"></ul>
            <div class="user-nav-container" id="user-container"></div>
        </nav>
    </header>

    <main>
        <h2>Checkout</h2>

        <a class="detalle-de-vuelo" href="../detalle-de-vuelo/detalle-de-vuelo-madrid1.html">Volver a detalle de vuelo</a>

        <ol class="container-lista">
            <li class="activo">Pasajeros</li>
            <li>Pago</li>
            <li>Confirmacion</li>
        </ol>

        <form id="form-pasajeros" class="container-datos-pasajeros" action="../checkout/pago.html" method="get">

            <h3>1. Datos del pasajero</h3>

            <!-- Pasajero 1 (siempre visible, no se puede eliminar) -->
            <div class="pasajero-bloque" id="pasajero-1">
                <h4>Pasajero 1</h4>
                <div class="container-campos">
                    <div class="campo-nombre">
                        <label>Nombre</label>
                        <input type="text" placeholder="Nombre" required>
                    </div>
                    <div class="campo-apellido">
                        <label>Apellido</label>
                        <input type="text" placeholder="Apellido" required>
                    </div>
                    <div class="campo-tipo-documento">
                        <label>Tipo de documento</label>
                        <select>
                            <option>DNI</option>
                            <option>L.E</option>
                            <option>L.C</option>
                            <option>C.I</option>
                            <option>Pasaporte</option>
                        </select>
                    </div>
                    <div class="campo-numero-dni">
                        <label>Número de documento</label>
                        <input type="text" inputmode="numeric" placeholder="1234568" required>
                    </div>
                    <div class="campo-fn">
                        <label>Fecha de nacimiento</label>
                        <input type="date" required>
                    </div>
                    <div class="campo">
                        <label>Nacionalidad</label>
                        <select>
                            <option>Argentina</option>
                            <option>Bolivia</option>
                            <option>Brasil</option>
                            <option>Chile</option>
                            <option>Paraguay</option>
                            <option>Uruguay</option>
                        </select>
                    </div>
                    <div class="campo-email">
                        <label>Email</label>
                        <input type="email" placeholder="juanperez@email.com" required>
                    </div>
                    <div class="campo-tel">
                        <label>Teléfono</label>
                        <input type="tel" placeholder="+54 11 1234 5678" required>
                    </div>
                </div>
            </div>

            <!-- Los pasajeros 2, 3 y 4 se inyectan aquí por JS -->
            <div id="pasajeros-extra"></div>

            <!-- Botón agregar -->
            <section class="botton-agregar-pasajero" id="btn-agregar-container">
                <button type="button" id="btn-agregar-pasajero"><strong>+ Agregar otro pasajero</strong></button>
            </section>

            <div class="botones">
                <section class="botton-cancelar">
                    <a href="../../home.html">
                        <button type="button">Cancelar</button>
                    </a>
                </section>
                <section class="botton-continuar">
                    <button type="submit">Continuar al Pago</button>
                </section>
            </div>

        </form>

    </main>

    <footer id="contacto-footer" class="footer-custom"></footer>

</body>

</html>
