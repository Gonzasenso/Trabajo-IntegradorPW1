<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link href="./estilos_Ingresar.css" rel="stylesheet">
    <script src="login.js" defer></script>
</head>

<body>
    <main>
        <section class="section-formulario">

            <form class="form-form" id="form-login">

                <label for="usuario">Usuario (o Email):</label>
                <input type="text" id="usuario" name="usuario" placeholder="Coloca aquí tu nombre de usuario o email."
                    required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Coloca aquí tu contraseña." required>

                <div id="mensajeLogin" class="mensajeLogin"></div>


                <div class="form-actions">
                    <button type="submit" class="btn-ingresar">Ingresar</button>
                    <a href="../../index.html" class="btn-cancelar">Cancelar</a>
                </div>

            </form>

        </section>
    </main>
</body>

</html>
