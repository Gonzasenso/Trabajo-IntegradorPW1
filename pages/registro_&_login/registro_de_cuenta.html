<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link href="./estilos_crear_cuenta.css" rel="stylesheet">
    <script src="./registro.js" defer></script>
</head>

<body>
    <main>
        <section class="section-formulario">
            <form class="form-form" id="form-registro">

                <div class="grupo-input">
                    <label for="username">Nombre de Usuario: <span>(*)</span></label>
                    <input type="text" id="username" name="username"
                        placeholder="Elegí tu nombre de usuario (Máximo 15 caracteres, solo letras, números y/o guion bajo)"
                        maxlength="15" pattern="[a-zA-Z0-9ñÑ_]+"
                        title="El nombre de usuario solo puede contener letras, números y guion bajo, sin espacios ni otros símbolos."
                        required>
                </div>

                <div class="grupo-input">
                    <label for="password-reg">Contraseña: <span>(*)</span></label>
                    <input type="password" id="password-reg" placeholder="Creá tu contraseña (Mínimo 4 caracteres)"
                        required>
                </div>

                <div class="fila-nombres">
                    <div class="grupo-input">
                        <label for="nombre1">Nombre 1: <span>(*)</span></label>
                        <input type="text" id="nombre1" name="nombre1" placeholder="Tu primer nombre." maxlength="40"
                            required>
                    </div>

                    <div class="grupo-input">
                        <label for="nombre2">Nombre 2:</label>
                        <input type="text" id="nombre2" name="nombre2" placeholder="Tu segundo nombre." maxlength="40">
                    </div>
                </div>

                <div class="grupo-input">
                    <label for="apellido">Apellido: <span>(*)</span></label>
                    <input type="text" id="apellido" name="apellido" placeholder="Coloca aquí tu apellido."
                        maxlength="40" required>
                </div>

                <div class="fila-nombres">
                    <div class="grupo-input">
                        <label for="tipo_doc">Tipo de Documento: <span>(*)</span></label>
                        <select id="tipo_doc" name="tipo_doc" required>
                            <option value="" disabled selected>Selecciona tipo</option>
                            <option value="dni">D.N.I</option>
                            <option value="le">L.E</option>
                            <option value="lc">L.C</option>
                            <option value="ci">C.I</option>
                            <option value="pasaporte">Pasaporte</option>
                        </select>
                    </div>

                    <div class="grupo-input">
                        <label for="num_doc">Número de Documento: <span>(*)</span></label>
                        <input type="text" id="num_doc" name="num_doc" placeholder="Solo números" pattern="[0-9]+"
                            maxlength="12" required>
                    </div>
                </div>

                <div class="fila-nombres">
                    <div class="grupo-input">
                        <label for="fecha_nac">Fecha de Nacimiento: <span>(*)</span></label>
                        <input type="date" id="fecha_nac" name="fecha_nac" required>
                    </div>

                    <div class="grupo-input">
                        <label for="email">E-mail: <span>(*)</span></label>
                        <input type="email" id="email" name="email" placeholder="Coloca aquí tu@email.com"
                            autocomplete="email" required>
                    </div>
                </div>

                <div class="fila-nombres">
                    <div class="grupo-input">
                        <label for="telefono">Teléfono Móvil: <span>(*)</span></label>
                        <input type="tel" id="telefono" pattern="[0-9\+\-\s\(\)]+" title="Ingresar teléfono válido"
                            placeholder="+54 9 11 555 4444" required>
                    </div>

                    <div class="grupo-input">
                        <label for="direccion">Dirección: <span>(*)</span></label>
                        <input type="text" id="direccion" name="direccion"
                            placeholder="Coloca aquí tu domicilio actual." maxlength="80" required>
                    </div>
                </div>

                <div class="fila-nombres">
                    <div class="grupo-input">
                        <label for="cp">Código Postal: <span>(*)</span></label>
                        <input type="text" id="cp" name="codigo_postal" placeholder="Tu código postal." maxlength="10"
                            required>
                    </div>

                    <div class="grupo-input">
                        <label for="localidad">Localidad: <span>(*)</span></label>
                        <input type="text" id="localidad" name="localidad"
                            placeholder="Coloca aquí la localidad donde vivís." maxlength="50" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-ingresar">Registrarse</button>
                    <button type="reset" class="btn-limpiar">Limpiar Formulario</button>
                    <a href="../../index.html" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</body>

</html>
